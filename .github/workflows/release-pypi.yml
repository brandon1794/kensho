# Release — publishes the Python adapter(s) to PyPI via Trusted Publishing (OIDC).
#
# Trigger: same `v*` tag as the npm release. The version published is whatever
# packages/pytest/pyproject.toml declares — bump it before tagging.
#
# No API token: authentication is OIDC. One-time setup on PyPI — add a
# "pending publisher" (PyPI → Your projects / org → Publishing → Add):
#   PyPI Project Name : kensho-pytest
#   Owner             : brandon1794
#   Repository name   : kensho
#   Workflow name     : release-pypi.yml
#   Environment       : (leave blank)
# (Repeat for kensho-robot if/when you add it below.)

name: Release (PyPI)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC for PyPI Trusted Publishing

jobs:
  pypi-pytest:
    name: Publish kensho-pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build packages/pytest
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/pytest/dist
          # If a previous version is already up, don't fail the whole release:
          skip-existing: true

  pypi-robot:
    name: Publish kensho-robot
    runs-on: ubuntu-latest
    # Non-blocking: kensho-robot's PyPI trusted publisher isn't set up yet, so a
    # failure here must NOT fail the release (pytest + the npm packages still
    # ship). Remove this line once the kensho-robot pending publisher exists.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build packages/robot
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/robot/dist
          skip-existing: true
