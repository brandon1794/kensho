name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
env:
  NODE_VERSION: 22
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # No version here — pnpm/action-setup reads it from package.json's
      # "packageManager" field (pnpm@10.x). Specifying both errors out.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build viewer
        run: pnpm --filter @kaizenreport/kensho-viewer run build
      - name: Audit (fail on high or critical)
        run: pnpm audit --audit-level high
