# Release — publishes the Ruby adapters to RubyGems.org via Trusted Publishing.
#
# Manual trigger (workflow_dispatch). Uses OIDC (no API key, no MFA hassle).
#
# One-time setup on rubygems.org — add a **Pending Trusted Publisher** for EACH
# gem (rubygems.org → the gem / your profile → Trusted Publishers → Create):
#   Gem name:        kensho-rspec        (then repeat for kensho-cucumber-ruby)
#   Repository:      brandon1794/kensho
#   Workflow:        release-rubygems.yml
#   Environment:     (leave blank)

name: Release (RubyGems)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC for RubyGems Trusted Publishing

jobs:
  rubygems:
    name: Publish Ruby adapters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - name: Configure RubyGems credentials (OIDC trusted publishing)
        uses: rubygems/configure-rubygems-credentials@v2.0.0
      - name: Build + push gems
        run: |
          set -e
          for dir in packages/rspec packages/cucumber-ruby; do
            echo "::group::$dir"
            cd "$dir"
            gem build ./*.gemspec
            gem push ./*.gem
            cd - >/dev/null
            echo "::endgroup::"
          done
