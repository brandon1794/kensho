# Release — publishes the .NET adapters to NuGet.org via Trusted Publishing.
#
# Manual trigger (workflow_dispatch). Uses OIDC (NuGet/login) — no API key.
#
# One-time setup on nuget.org → account → Trusted Publishing → New policy:
#   Policy Name:      kensho-ci  (any name)
#   Package Owner:    brandon1794
#   Repository Owner: brandon1794
#   Repository:       kensho
#   Workflow File:    release-nuget.yml
#   Environment:      (leave blank)
#
# NOTE: the `user:` below must be your nuget.org username (assumed brandon1794).
#
# Order matters: the shared Core package is pushed first; the adapters
# ProjectReference it, so their nupkgs depend on KaizenReport.Kensho.Core.

name: Release (NuGet)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC for NuGet Trusted Publishing

jobs:
  nuget:
    name: Publish .NET adapters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: NuGet login (OIDC trusted publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: brandon1794
      - name: Pack + push (Core first, then adapters)
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          set -e
          out=$(mktemp -d)
          for proj in \
            packages/dotnet-core/KaizenReport.Kensho.Core.csproj \
            packages/nunit/KaizenReport.Kensho.NUnit.csproj \
            packages/mstest/KaizenReport.Kensho.MSTest.csproj \
            packages/xunit/KaizenReport.Kensho.Xunit.csproj ; do
            echo "::group::pack $proj"
            dotnet pack "$proj" -c Release -o "$out"
            echo "::endgroup::"
          done
          # Push Core first so the adapters' dependency resolves, then the rest.
          dotnet nuget push "$out/KaizenReport.Kensho.Core."*.nupkg \
            --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          for pkg in "$out"/*.nupkg; do
            case "$pkg" in *Kensho.Core.*) continue;; esac
            dotnet nuget push "$pkg" \
              --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
