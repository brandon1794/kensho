[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kensho-robot"
version = "0.3.0"
description = "Kensho reporter for Robot Framework — writes kensho-results/ so the Kensho CLI can generate a rich HTML report."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "KaizenReport" }]
keywords = ["robotframework", "kensho", "kaizenreport", "test-report", "reporter", "listener"]
classifiers = [
  "Framework :: Robot Framework",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Testing",
]
dependencies = [
  "robotframework>=5.0",
]

[project.urls]
Homepage = "https://github.com/kaizenreport/kensho"
Source = "https://github.com/kaizenreport/kensho"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
kensho_robot = ["py.typed"]
